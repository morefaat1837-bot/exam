<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخطط الإنجاز الطبي - نسخة القالب</title>
    <style>
        :root { 
            --red: #ff5252; --yellow1: #fff59d; --yellow2: #fff176; 
            --yellow3: #ffd600; --blue: #1976d2; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; padding: 15px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .exam-banner { background: #263238; color: #ffeb3b; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 2px solid #ffeb3b; }
        .plan-engine { background: #e3f2fd; padding: 20px; border-radius: 15px; border: 2px solid var(--blue); margin-bottom: 25px; text-align: center; }
        .input-flex { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
        .result-box { background: white; padding: 15px; border-radius: 10px; border-right: 5px solid var(--blue); font-weight: bold; line-height: 1.8; color: #0d47a1; margin-top: 15px; min-height: 120px; }
        .live-timer-display { font-size: 3em; font-weight: bold; color: #d32f2f; margin: 15px 0; font-family: monospace; background: white; display: inline-block; padding: 10px 30px; border-radius: 10px; border: 3px solid #d32f2f; }
        .btn-start { background: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-stop { background: #c62828; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        th { background: var(--blue); color: white; padding: 12px; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; font-weight: 600; }
        .row-white { background-color: var(--white); }
        .row-red { background-color: #ffcdd2 !important; color: #b71c1c !important; }
        .row-yellow1 { background-color: var(--yellow1); }
        input, select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        /* استايل موحد لصور الاستيكرات */
        .sticker-img { width: 80px; height: 80px; object-fit: contain; display: block; margin: 0 auto 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="exam-banner">
        <span>⏳ المتبقي على الامتحان النهائي:</span>
        <input type="datetime-local" id="exam-date-input" onchange="saveExamDate()">
        <div id="exam-countdown" style="margin-top:10px; font-size: 1.4em;">-- يوم -- ساعة</div>
    </div>

    <div class="stats-bar" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px;">
        <div class="stat-card" style="background: #2196f3; color: white; padding: 10px; border-radius: 8px; text-align: center;">
            <b>الإجمالي العام</b><br><span id="stat-total-all">0 موضوع</span>
        </div>
        <div class="stat-card" style="background: #78909c; color: white; padding: 10px; border-radius: 8px; text-align: center;">
            <b>لم يبدأ (أبيض)</b><br><span id="stat-white-all">0 صفحة</span>
        </div>
        <div class="stat-card" style="background: #ff5252; color: white; padding: 10px; border-radius: 8px; text-align: center;">
            <b>مسموع (أحمر)</b><br><span id="stat-red-all">0 صفحة</span>
        </div>
        <div class="stat-card" style="background: #ffd600; color: black; padding: 10px; border-radius: 8px; text-align: center;">
            <b>مراجع (أصفر)</b><br><span id="stat-yellow-all">0 صفحة</span>
        </div>
    </div>

    <div class="plan-engine">
        <h3>🎯 تحدي اليوم (التايمر الحي):</h3>
        <div class="input-flex">
            <span>نوع الخطة:</span>
            <select id="plan-type" onchange="calculateLogic()">
                <option value="all">مذاكرة (أبيض + أحمر)</option>
                <option value="white">جديد (أبيض)</option>
                <option value="red">مسموع (أحمر)</option>
                <option value="yellow1">مراجعة 1</option>
            </select>
            <span>أنهي الساعة:</span>
            <input type="time" id="end-time" onchange="calculateRemainingTime()">
        </div>
        <button class="btn-start" onclick="startPlanTimer()">ابدأ ▶️</button>
        <button class="btn-stop" onclick="stopPlanTimer()">إيقاف ⏹️</button>
        <div class="live-timer-display" id="live-timer">00:00:00</div>
        <div id="logic-results" class="result-box">حدد هدفك ووقت النهاية..</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>القسم</th>
                <th>الموضوع</th>
                <th>صفحات</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="data-body"></tbody>
    </table>
</div>

<script>
    // البيانات الافتراضية (تقدر تغير الأسماء العربي هنا)
    let initialData = [
        { cat: "Chest", task: "COPD", p: 7, status: "red" },
        { cat: "Chest", task: "Bronchial Asthma", p: 14, status: "yellow1" },
        { cat: "Chest", task: "TB", p: 13, status: "red" },
        { cat: "Chest", task: "Pneumonia", p: 10, status: "white" },
        { cat: "Ophthalmology", task: "Conjunctivitis", p: 20, status: "white" },
        { cat: "Ophthalmology", task: "Keratitis", p: 14, status: "white" },
        { cat: "Ophthalmology", task: "Uveitis", p: 14, status: "white" },
        { cat: "Ophthalmology", task: "Glaucoma", p: 7, status: "white" },
        { cat: "Hematology", task: "Anemia 1", p: 16, status: "white" },
        { cat: "Hematology", task: "Anemia 2", p: 14, status: "red" },
        { cat: "Nephrology", task: "Renal Function", p: 19, status: "white" },
        { cat: "Nephrology", task: "Symptoms", p: 23, status: "yellow1" },
        { cat: "Nephrology", task: "Physiology", p: 12, status: "yellow1" },
        { cat: "Nephrology", task: "Malignancies", p: 10, status: "yellow1" },
        { cat: "GIT", task: "GURD & PUD", p: 9, status: "white" }
    ];

    let subjects = JSON.parse(localStorage.getItem('medStudyDataFull')) || initialData;
    let remainingSeconds = 0;
    let planInterval;

    function saveExamDate() { localStorage.setItem('examDateFull', document.getElementById('exam-date-input').value); }
    document.getElementById('exam-date-input').value = localStorage.getItem('examDateFull') || "";

    function render() {
        const body = document.getElementById('data-body');
        if(!body) return;
        body.innerHTML = '';
        
        // تجهيز العدادات (مواضيع وصفحات) لكل حالة
        let counts = { 
            totalM: 0, totalP: 0, 
            whiteM: 0, whiteP: 0, 
            redM: 0, redP: 0, 
            yellowM: 0, yellowP: 0 
        };

        subjects.forEach((item, index) => {
            counts.totalM++;
            counts.totalP += item.p;
            
            if (item.status === 'white') { 
                counts.whiteM++; 
                counts.whiteP += item.p; 
            }
            else if (item.status === 'red') { 
                counts.redM++; 
                counts.redP += item.p; 
            }
            else if (item.status.includes('yellow')) { 
                counts.yellowM++; 
                counts.yellowP += item.p; 
            }

            const tr = document.createElement('tr');
            tr.className = `row-${item.status}`;
            tr.innerHTML = `
                <td>${item.cat}</td>
                <td>${item.task}</td>
                <td><input type="number" value="${item.p}" style="width:40px" onchange="updateP(${index}, this.value)"></td>
                <td>
                    <select onchange="updateS(${index}, this.value)">
                        <option value="white" ${item.status==='white'?'selected':''}>⚪ جديد</option>
                        <option value="red" ${item.status==='red'?'selected':''}>🔴 مسموع</option>
                        <option value="yellow1" ${item.status==='yellow1'?'selected':''}>🟡 مراجعة</option>
                    </select>
                </td>
            `;
            body.appendChild(tr);
        });

        // التحديث في الـ HTML ليظهر (عدد المواضيع | عدد الصفحات) في كل الخانات
        document.getElementById('stat-total-all').innerHTML = `${counts.totalM} موضوع <br> ${counts.totalP} صفحة`;
        document.getElementById('stat-white-all').innerHTML = `${counts.whiteM} موضوع <br> ${counts.whiteP} صفحة`;
        document.getElementById('stat-red-all').innerHTML = `${counts.redM} موضوع <br> ${counts.redP} صفحة`;
        document.getElementById('stat-yellow-all').innerHTML = `${counts.yellowM} موضوع <br> ${counts.yellowP} صفحة`;
        
        localStorage.setItem('medStudyDataFull', JSON.stringify(subjects));
        calculateLogic();
    }

    function updateP(i, v) { subjects[i].p = parseInt(v) || 0; render(); }
    function updateS(i, v) { subjects[i].status = v; render(); }

    function calculateRemainingTime() {
        const endTime = document.getElementById('end-time').value;
        if (!endTime) return;
        const now = new Date();
        const [h, m] = endTime.split(":");
        let target = new Date();
        target.setHours(h, m, 0);
        if (target < now) target.setDate(target.getDate() + 1);
        remainingSeconds = Math.floor((target - now) / 1000);
        displayTime();
        calculateLogic();
    }

    function startPlanTimer() {
        clearInterval(planInterval);
        calculateRemainingTime();
        planInterval = setInterval(() => {
            if(remainingSeconds <= 0) { clearInterval(planInterval); return; }
            remainingSeconds--;
            displayTime();
            calculateLogic();
        }, 1000);
    }

    function stopPlanTimer() { clearInterval(planInterval); }

    function displayTime() {
        let h = Math.floor(remainingSeconds / 3600);
        let m = Math.floor((remainingSeconds % 3600) / 60);
        let s = remainingSeconds % 60;
        document.getElementById('live-timer').innerText = 
            `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function calculateLogic() {
        const goal = document.getElementById('plan-type').value;
        const currentMins = remainingSeconds / 60;
        let targetPages = 0;

        subjects.forEach(s => {
            if (goal === 'all' && (s.status === 'white' || s.status === 'red')) targetPages += s.p;
            else if (goal === s.status) targetPages += s.p;
        });

        const resBox = document.getElementById('logic-results');
        if(!resBox) return; // تأمين

        if(targetPages === 0 || currentMins <= 0) {
            // بناء الـ HTML النهائي - دمج الاستيكر مع عدد المواضيع والصفحات
        resBox.innerHTML = 
            `<img src="${stickerLink}" class="sticker-img" onerror="this.style.display='none'">` +
            `<div style="color:red; font-size:18px; margin-bottom:5px;">${reactionText}</div>` +
            `<div style="background:#f0f7ff; padding:10px; border-radius:8px;">` +
                `<b>المطلوب:</b> ${targetPages} صفحة في ${subjects.filter(s => goal==='all' ? (s.status==='white'||s.status==='red') : s.status===goal).length} موضوع <br>` +
                `<b>السرعة:</b> <span style="color:red">${minsPerPage} دقيقة</span> لكل صفحة` +
            `</div>`;
        }

        const minsPerPage = (currentMins / targetPages).toFixed(1);
        
        // --- الجزء الخاص بتعديل الاستيكرات والكلمات ---
        let stickerLink = "";
        let reactionText = "";

        if (minsPerPage > 15) {
            // الحالة 1: الخطة الرايقة جداً
            stickerLink = "https://i.ibb.co/tw2GC6cM/bc4d0233-eec1-4cc8-8a60-34885603b95f.webp"; 
            reactionText = "أسد يلا متخافش ";
        } else if (minsPerPage > 8) {
            // الحالة 2: الخطة المتوسطة (مذاكرة بجد)
            stickerLink = "https://i.ibb.co/tpt5Lqyx/d2047bcb-86cd-49e1-8132-2a7b1f733212.webp";
            reactionText = "ربنا يسهل";
        } else if (minsPerPage > 4) {
            // الحالة 3: الخطة الصعبة (بدأ التوتر)
            stickerLink = "https://i.ibb.co/YmMS2nB/30667500-744c-4f97-96d8-ab357359b6d3.webp";
            reactionText = "!!!انت فاكر نفسك البيار!!!";
        } else {
            // الحالة 4: الخطة المستحيلة (انتحار)
            stickerLink = "https://i.ibb.co/wr0XTDsy/b14a4954-11b4-4d13-8d6a-422524aaf10c.webp";
            reactionText = "أحا ابقي قابلني يعلق";
        }
        // ----------------------------------------------

        // بناء الـ HTML النهائي للعرض (بيانات + استيكر + كلمة)
        resBox.innerHTML = 
            `<img src="${stickerLink}" alt="Sticker" class="sticker-img" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3221/3221291.png';">` +
            `<div style="color:red; font-size:18px">${reactionText}</div>` +
            `<div style="font-size:14px; color:#555">المتبقي: ${targetPages} صفحة | لكل صفحة: ${minsPerPage} دقيقة</div>`;
    }

    setInterval(() => {
        const target = new Date(document.getElementById('exam-date-input').value).getTime();
        const diff = target - new Date().getTime();
        if (target && diff > 0) {
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('exam-countdown').innerText = `${d} يوم و ${h} ساعة`;
        }
    }, 1000);

    render();
</script>
</body>
</html>
